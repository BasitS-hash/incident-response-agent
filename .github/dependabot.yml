version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: "monthly"
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: "monthly"
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "javascript"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: "monthly"
      day: monday
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: "monthly"
      day: monday
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "chore(ci)"

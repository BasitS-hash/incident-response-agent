# ⚠️  LOCAL DEV ONLY — rotate ALL secrets before any non-local deployment.
# NEXTAUTH_SECRET, SALT, and POSTGRES_PASSWORD below are placeholder values
# intentionally weak. Do not use these in staging or production.
version: "3.8"

services:
  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/langfuse
      NEXTAUTH_SECRET: supersecret
      NEXTAUTH_URL: http://localhost:3001
      SALT: supersalt
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: langfuse
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
